<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assorted AI Learning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090f;
      --surface: #0f1221;
      --surface-2: #161c30;
      --border: #1e2640;
      --accent: #00e5ff;
      --accent-purple: #c084fc;
      --accent-green: #34d399;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --text-dim: #5a6375;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }

    .brand-name span { color: var(--accent); }

    .brand-sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hub-link {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }

    .hub-link:hover { color: var(--accent); }

    /* ── Hero ── */
    .hero {
      padding: 56px 32px 40px;
      max-width: 880px;
      margin: 0 auto;
      width: 100%;
    }

    .hero h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .hero h1 span { color: var(--accent); }

    .hero p {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 600px;
    }

    .count-badge {
      display: inline-block;
      margin-top: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ── Grid ── */
    main {
      flex: 1;
      padding: 0 32px 64px;
      max-width: 880px;
      margin: 0 auto;
      width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--surface-2);
      transform: translateY(-2px);
    }

    .card-icon {
      width: 36px;
      height: 36px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--accent);
    }

    .card h3 {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }

    .card p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-arrow {
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 32px;
      color: var(--text-dim);
    }

    .empty svg {
      width: 48px;
      height: 48px;
      stroke: var(--border);
      margin-bottom: 16px;
    }

    .empty p { font-size: 14px; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 32px;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
    }

    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <span class="brand-name">ASSORTED <span>AI</span> LEARNING</span>
      <span class="brand-sub">Standalone materials · No prerequisite chain</span>
    </div>
    <a href="https://course-landing-hub.vercel.app" class="hub-link">← Neural Hub</a>
  </header>

  <div class="hero">
    <h1>AI Learning <span>Collection</span></h1>
    <p>Focused, standalone pieces — concept explainers, deep dives, and reference guides. Read in any order.</p>
    <span class="count-badge" id="count-badge">Loading…</span>
  </div>

  <main>
    <div class="grid" id="grid">
      <!-- cards injected by JS -->
    </div>
  </main>

  <footer>
    Part of <a href="https://course-landing-hub.vercel.app">Neural Hub</a> &mdash; AI courses for practitioners
  </footer>

  <script>
    // ── File manifest — add entries here as new files are uploaded ──
    const FILES = [
      // { href: 'filename.html', title: 'Display Title', desc: 'One-line description' },
    ];

    const grid = document.getElementById('grid');
    const badge = document.getElementById('count-badge');

    function fileIcon() {
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>`;
    }

    if (FILES.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <p>Materials loading in shortly — check back soon.</p>
        </div>`;
      badge.textContent = '0 pieces';
    } else {
      badge.textContent = `${FILES.length} piece${FILES.length === 1 ? '' : 's'}`;
      grid.innerHTML = FILES.map(f => `
        <a href="${f.href}" class="card">
          <div class="card-icon">${fileIcon()}</div>
          <h3>${f.title}</h3>
          <p>${f.desc}</p>
          <div class="card-arrow">Read →</div>
        </a>`).join('');
    }
  </script>

</body>
</html>
