<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assorted AI Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f7f3;
      --surface: #ffffff;
      --surface-hover: #f7f5f1;
      --border: #e8e5e0;
      --border-strong: #e2dfd9;
      --text-primary: #1a1a24;
      --text-secondary: #636275;
      --text-muted: #838394;
      --text-faint: #a3a3b0;
      --nav-text: #717190;
      --tag-concept-text: #8a6f30;
      --tag-concept-bg: #f5eedc;
      --tag-deepdive-text: #2c5f9e;
      --tag-deepdive-bg: #ddeaf8;
      --tag-reference-text: #2a7051;
      --tag-reference-bg: #d8f0e5;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border-strong);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 32px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wordmark {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--nav-text);
    }

    .hub-link {
      font-size: 13px;
      color: var(--nav-text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }

    .hub-link:hover { color: var(--text-primary); }

    /* ── Hero ── */
    .hero {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 32px 56px;
      width: 100%;
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(36px, 5vw, 52px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 17px;
      font-weight: 300;
      line-height: 1.65;
      color: var(--text-secondary);
      max-width: 520px;
    }

    /* ── Filter buttons ── */
    .filters {
      display: flex;
      gap: 8px;
      margin-top: 36px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--text-primary);
      border-color: var(--text-primary);
      color: var(--bg);
    }

    .filter-btn:not(.active):hover {
      border-color: var(--nav-text);
    }

    /* ── Divider ── */
    .divider {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 32px;
      width: 100%;
    }

    .divider-line {
      height: 1px;
      background: var(--border-strong);
    }

    /* ── Grid ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 32px 80px;
      width: 100%;
      flex: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, border-color 0.15s;
      animation: fadeUp 0.4s ease both;
    }

    .card:hover {
      background: var(--surface-hover);
      border-color: var(--nav-text);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }

    .type-tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
    }

    .type-tag.concept {
      color: var(--tag-concept-text);
      background: var(--tag-concept-bg);
    }

    .type-tag.deep-dive {
      color: var(--tag-deepdive-text);
      background: var(--tag-deepdive-bg);
    }

    .type-tag.reference {
      color: var(--tag-reference-text);
      background: var(--tag-reference-bg);
    }

    .read-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      font-weight: 400;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.65;
      color: var(--text-secondary);
      flex: 1;
    }

    .card-link {
      margin-top: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      border-bottom: 1px solid var(--text-faint);
      display: inline-block;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 32px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border-strong);
      margin-top: auto;
    }

    .footer-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-left {
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer-left a {
      color: var(--text-secondary);
      text-decoration: none;
      border-bottom: 1px solid var(--text-faint);
    }

    .footer-left a:hover { color: var(--text-primary); }

    .footer-right {
      font-size: 12px;
      color: var(--text-faint);
      letter-spacing: 0.04em;
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .hero { padding: 48px 20px 40px; }
      .header-inner, main, .divider { padding-left: 20px; padding-right: 20px; }
      .footer-inner { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="wordmark">Assorted AI Learning</span>
      <a href="https://course-landing-hub.vercel.app" class="hub-link">
        <span>&larr;</span> Neural Hub
      </a>
    </div>
  </header>

  <section class="hero">
    <h1>AI Learning Collection</h1>
    <p>Focused, standalone pieces — concept explainers, deep dives, and reference guides. Read in any order.</p>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="concept">Concept</button>
      <button class="filter-btn" data-filter="deep-dive">Deep Dive</button>
      <button class="filter-btn" data-filter="reference">Reference</button>
    </div>
  </section>

  <div class="divider"><div class="divider-line"></div></div>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    <div class="footer-inner">
      <span class="footer-left">Part of <a href="https://course-landing-hub.vercel.app">Neural Hub</a> &mdash; AI courses for practitioners</span>
      <span class="footer-right">Standalone &middot; No prerequisites</span>
    </div>
  </footer>

  <script>
    const FILES = [
      {
        href: 'AI-Oracle_LLM-Iceberg-Explainer_v6.html',
        title: 'The Iceberg of Machine Intelligence — A Course on How LLMs Actually Think',
        desc: 'How predicting one word at a time forces an LLM to learn grammar, meaning, world facts, and reasoning. 10-stop journey with multi-analogy tabs, go-deeper panels, progress sidebar, interactive labs, and challenge Q&A.',
        type: 'deep-dive',
        readTime: 45
      },
      {
        href: 'agent_traits_chef_guide_v2.html',
        title: 'What Makes an AI Agent? — The Chef\'s Kitchen Guide',
        desc: 'The core traits that turn an LLM into an autonomous agent — explained through a chef\'s kitchen. Memory, tools, planning, and multi-agent coordination, with interactive demos.',
        type: 'concept',
        readTime: 20
      },
    ];

    const TYPE_LABELS = {
      'concept': 'Concept',
      'deep-dive': 'Deep Dive',
      'reference': 'Reference'
    };

    const grid = document.getElementById('grid');

    function renderCards(filter) {
      const visible = filter === 'all' ? FILES : FILES.filter(f => f.type === filter);

      if (visible.length === 0) {
        grid.innerHTML = '<div class="empty">No articles match this filter.</div>';
        return;
      }

      grid.innerHTML = visible.map((f, i) => `
        <a href="${f.href}" class="card" style="animation-delay: ${(i + 1) * 0.05}s">
          <div class="card-meta">
            <span class="type-tag ${f.type}">${TYPE_LABELS[f.type]}</span>
            <span class="read-time">${f.readTime} min read</span>
          </div>
          <h2>${f.title}</h2>
          <p>${f.desc}</p>
          <span class="card-link">Read &rarr;</span>
        </a>`).join('');
    }

    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards(btn.dataset.filter);
    });

    renderCards('all');
  </script>

</body>
</html>
